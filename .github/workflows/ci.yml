name: Desafio NEXDOM - Playwright API, UI and k6 Performance Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  automated-tests:
    name: Playwright API and UI Tests
    runs-on: ubuntu-latest

    env:
      API_BASE_URL: https://reqres.in/api
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}
      WEB_BASE_URL: https://www.saucedemo.com
      STANDARD_USER: standard_user
      LOCKED_USER: locked_out_user
      PASSWORD: secret_sauce

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Validate Secret
        run: |
          if [ -z "$REQRES_API_KEY" ]; then
            echo "Secret not configured"
            exit 1
          else
            echo "Secret OK"
          fi

      - name: Run API tests
        run: npm run test:api

      - name: Run UI tests
        run: npm run test:ui

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  performance-tests:
    name: k6 Performance Tests
    runs-on: ubuntu-latest
    needs: automated-tests

    env:
      API_BASE_URL: https://reqres.in/api
      REQRES_API_KEY: ${{ secrets.REQRES_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run performance tests
        run: npm run test:performance